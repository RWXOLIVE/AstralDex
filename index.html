<!DOCTYPE html>

  <!-- Apply saved theme ASAP to avoid flash -->
  <script>
(() => {
  const root = document.documentElement;
  const saved = localStorage.getItem('porydex-theme') || 'dark';
  root.classList.remove('dark-mode', 'theme-light', 'theme-dark', 'theme-azure', 'theme-space');
  if (saved === 'light') return;
  root.classList.add('dark-mode');
  if (saved === 'azure') root.classList.add('theme-azure');
  if (saved === 'space') root.classList.add('theme-space');
})();
</script>

  <!-- Theme logic -->
  <script>
(function () {
  const select = document.getElementById('themeSelect');
  if (!select) return;
  const allowed = new Set(['light', 'dark', 'azure', 'space']);

  const saved = localStorage.getItem('porydex-theme');
  const initial = allowed.has(saved) ? saved : 'dark';
  select.value = initial;
  applyTheme(initial);

  select.addEventListener('change', () => {
    const theme = allowed.has(select.value) ? select.value : 'dark';
    applyTheme(theme);
    try {
      localStorage.setItem('porydex-theme', theme);
    } catch (err) {}
  });

  function applyTheme(mode) {
    const root = document.documentElement;
    root.classList.remove('dark-mode', 'theme-light', 'theme-dark', 'theme-azure', 'theme-space');
    if (mode === 'light') return;
    root.classList.add('dark-mode');
    if (mode === 'azure') root.classList.add('theme-azure');
    if (mode === 'space') root.classList.add('theme-space');
  }
})();
</script>
